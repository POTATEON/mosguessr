<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎉 Игра завершена - GeoGuessr</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 30px;
            color: #333;
        }

        .final-score {
            font-size: 72px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 30px 0;
        }

        .stats {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 15px;
            margin: 30px 0;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
        }

        .btn {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            margin: 10px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎉 Игра завершена!</h1>

            <div class="final-score">{{ total_score }}</div>
            <p>финальный счёт</p>

            <div class="stats">
                <div class="stat-row">
                    <span>🎯 Раундов сыграно:</span>
                    <strong>{{ rounds_played }}</strong>
                </div>
                <div class="stat-row">
                    <span>📊 Средний счёт за раунд:</span>
                    <strong>{{ avg_score }}</strong>
                </div>
                <div class="stat-row">
                    <span>🏆 Лучший раунд:</span>
                    <strong>{{ best_round }}</strong>
                </div>
            </div>

            <div>
                <a href="/" class="btn">🏠 На главную</a>
                <a href="/leaderboard" class="btn">🏆 Таблица рекордов</a>
            </div>
        </div>
    </div>
</body>
</html>
